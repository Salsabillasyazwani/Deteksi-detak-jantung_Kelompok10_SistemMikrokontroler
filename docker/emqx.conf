# ============================================================
# EMQX Enterprise 6.x Configuration (HOCON Format)
# ============================================================

# Konfigurasi MQTT Global
mqtt {
  # Izinkan koneksi tanpa username/password (mode development)
  # Ubah ke false dan aktifkan auth untuk produksi
  allow_anonymous = true
  max_packet_size = 1MB
}

# ============================================================
# Konfigurasi Listeners
# ============================================================

# MQTT TCP Listener — untuk ESP32 dan Python Backend
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 102400
}

# MQTT WebSocket Listener — untuk Web Dashboard (MQTT.js)
listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 10240
  # Path WebSocket — harus cocok dengan URL di app.js: ws://host:8083/mqtt
  websocket.mqtt_path = "/mqtt"
}

# ============================================================
# Konfigurasi Dashboard Admin (port 18083)
# ============================================================
dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
  # Default login: admin / public
  # WAJIB diganti untuk produksi
  default_username = "admin"
  default_password = "Hengkerjahat@"
}

# ============================================================
# Log Level (ubah ke warning untuk produksi)
# ============================================================
log {
  console {
    level = info
  }
}
